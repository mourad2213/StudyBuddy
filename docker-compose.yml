services:
  # =======================
  # ZOOKEEPER
  # =======================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - studybuddy-network

  # =======================
  # KAFKA
  # =======================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Reduce the group coordinator delay so __consumer_offsets
      # elects its leader faster on single-broker setups
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    healthcheck:
      # Wait until Kafka can actually describe the __consumer_offsets
      # topic — this means internal topic election is done too
      test: >
        bash -c "
          kafka-topics --bootstrap-server kafka:29092 --list &&
          kafka-topics --bootstrap-server kafka:29092
            --describe --topic __consumer_offsets 2>/dev/null ||
          kafka-topics --bootstrap-server kafka:29092
            --create --topic __consumer_offsets
            --partitions 50 --replication-factor 1 2>/dev/null;
          exit 0
        "
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 30s
    networks:
      - studybuddy-network

  # =======================
  # USER SERVICE
  # =======================
  user-service:
    build: ./services/user-service
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      SERVICE_NAME: user-service
      DATABASE_URL: postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/User_db?sslmode=require&channel_binding=require
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: supersecret
      NODE_ENV: development
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - studybuddy-network

  # =======================
  # AVAILABILITY SERVICE
  # =======================
  availability-service:
    build: ./services/availability-service
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      SERVICE_NAME: availability-service
      DATABASE_URL: postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/Availability_db?sslmode=require&channel_binding=require
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: your-secret-key-here
      NODE_ENV: development
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - studybuddy-network

  # =======================
  # MATCHING SERVICE
  # =======================
  matching-service:
    build: ./services/matching-service
    container_name: matching-service
    ports:
      - "4003:4003"   # fixed: was mapping 4003 but PORT was 4004
    environment:
      - DATABASE_URL=postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/Matching_db?sslmode=require&channel_binding=require
      - KAFKA_BROKERS=kafka:29092
      - PORT=4003      # fixed: was 4004, clashed with messaging-service
      - KAFKAJS_NO_PARTITIONER_WARNING=1
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - studybuddy-network

  # =======================
  # MESSAGING SERVICE (Real-time WebSocket)
  # =======================
  messaging-service:
    build: ./services/messaging-service
    container_name: messaging-service
    ports:
      - "4008:4008"
    environment:
      PORT: 4008
      SERVICE_NAME: messaging-service
      DATABASE_URL: postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/messaging_db?sslmode=require&channel_binding=require
      DIRECT_URL: postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/messaging_db?sslmode=require&channel_binding=require
      MATCHING_DATABASE_URL: postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/Matching_db?sslmode=require&channel_binding=require
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: your_jwt_secret_key
      NODE_ENV: development
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - studybuddy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s




  # =======================
  # NOTIFICATION SERVICE
  # =======================
  notification-service:
    build: ./services/notification-service
    ports:
      - "4005:4005"
    environment:
      PORT: 4005
      SERVICE_NAME: notification-service
      DATABASE_URL: "postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/Notification_db?sslmode=require"
      KAFKA_BROKER: kafka:29092
      NODE_ENV: development
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - studybuddy-network

  # =======================
  # PROFILE SERVICE
  # =======================
  profile-service:
    build: ./services/profile-service
    ports:
      - "4006:4006"
    environment:
      PORT: 4006
      SERVICE_NAME: profile-service
      DATABASE_URL: "postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/Profile%20and%20Study%20Preferences_db?sslmode=require"
      KAFKA_BROKER: kafka:29092
      NODE_ENV: development
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - studybuddy-network

  # =======================
  # SESSION SERVICE
  # =======================
  session-service:
    build: ./services/session-service
    container_name: session-service
    ports:
      - "4007:4007"
    environment:
      PORT: 4007
      SERVICE_NAME: session-service
      DATABASE_URL: postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/sessions_db?sslmode=require&channel_binding=require
      DIRECT_URL: postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/sessions_db?sslmode=require&channel_binding=require
      KAFKA_BROKERS: kafka:29092
      NODE_ENV: development
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - studybuddy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  studybuddy-network:
    driver: bridge