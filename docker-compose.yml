services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "4005:4005"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/Notification_db?sslmode=require&channel_binding=require"
      DIRECT_URL: "postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj.c-6.us-east-1.aws.neon.tech/Notification_db?sslmode=require&channel_binding=require"
      KAFKA_BROKER: kafka:29092

  profile-service:
    build: ./services/profile-service
    container_name: profile-service
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/Profile%20and%20Study%20Preferences_db?sslmode=require&channel_binding=require"
      DIRECT_URL: "postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj.c-6.us-east-1.aws.neon.tech/Profile%20and%20Study%20Preferences_db?sslmode=require&channel_binding=require"
      KAFKA_BROKER: kafka:29092

  availability-service:
    build: ./services/availability-service
    container_name: availability-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      AVAILABILITY_DB: "postgresql://neondb_owner:npg_a7hwVX5msfHg@ep-wandering-shadow-anmfx1jj-pooler.c-6.us-east-1.aws.neon.tech/Availability_db?sslmode=require&channel_binding=require"
      KAFKA_HOST: kafka:29092
      JWT_SECRET: "your-secret-key-here"
      PORT: 4002
      NODE_ENV: development